services:
  web:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DJANGO_SQLITE_PATH: /app/data/db.sqlite3
      DJANGO_MEDIA_ROOT: /app/media
    volumes:
      - sqlite_data:/app/data
      - media_data:/app/media
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/"]
      interval: 30s
      timeout: 5s
      retries: 5

volumes:
  sqlite_data:
  media_data:
